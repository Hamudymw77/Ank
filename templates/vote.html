<!DOCTYPE html>
<html lang="{{ t.lang_code }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anketa / Survey</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NMCXHBY6GV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NMCXHBY6GV');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page">

    <div class="lang-bar">
      <a href="{{ url_for('set_lang', code=t.lang_switch_code, next=request.path) }}" class="lang-btn">
        🌐 {{ t.lang_switch_label }}
      </a>
    </div>

    <header class="hero">
      <p class="eyebrow">{{ t.eyebrow_vote }}</p>
      <h1>{{ t.question }}</h1>
      <a href="/results" class="link-subtle">{{ t.show_results }}</a>
    </header>

    <main class="card">
      <form action="/vote" method="POST">
        {% for key, label in t.options.items() %}
        <label class="option">
          <input type="radio" name="choice" value="{{ key }}" required />
          <span class="option-body">
            <span class="radio-ring"></span>
            <span class="option-text">{{ label }}</span>
          </span>
        </label>
        {% endfor %}
        <button type="submit" class="btn-vote">{{ t.submit }}</button>
      </form>
    </main>

    <p class="info-note">{{ t.info_note }}</p>

    <footer class="bug-footer">
      <p class="bug-title">{{ t.bug_title }}</p>
      <p class="bug-desc">{{ t.bug_desc }}</p>
      <a href="https://github.com/Hamudymw77/Ank/issues" target="_blank" class="bug-link">
        {{ t.bug_link }}
      </a>
    </footer>

  </div>
</body>
</html>
